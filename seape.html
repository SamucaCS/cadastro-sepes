<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro – SEAPE</title>
    <link rel="stylesheet" href="seape.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="seape.js" defer></script>
</head>

<body>
    <div class="page">
        <header class="topbar">
            <div class="topbar-left">
                <h1>Cadastro – SEAPE</h1>
                <p class="subtitle">Evolução funcional, Aposentadoria, FAI &amp; PUCT.</p>
            </div>

            <div class="topbar-right">
                <span class="pill" id="pillTema">Tema: <strong>Evolução funcional</strong></span>
                <button class="btn ghost" id="btnIrIndex">Menu</button>
                <button class="btn ghost" id="btnIrSefrep">SEFREP</button>
            </div>
        </header>

        <main class="content">
            <aside class="sidebar">
                <div class="sidebar-title">Temas</div>

                <button class="nav-item active" data-tema="EVOLUCAO_FUNCIONAL">
                    <span class="dot"></span> Evolução funcional
                </button>
                <button class="nav-item" data-tema="APOSENTADORIA">
                    <span class="dot"></span> Aposentadoria
                </button>
                <button class="nav-item" data-tema="FAI_PUCT">
                    <span class="dot"></span> FAI &amp; PUCT
                </button>

                <div class="sidebar-foot">
                    <p class="hint">(Por enquanto) teste local no navegador.</p>
                </div>
            </aside>

            <section class="panel">
                <div class="panel-head">
                    <h2 id="tituloForm">Evolução funcional</h2>
                    <p class="panel-subtitle" id="descForm">Preencha e salve o registro.</p>
                </div>

                <form id="formSeape" class="form">
                    <div id="formArea"></div>

                    <div class="form-actions">
                        <button type="submit" class="btn primary">Salvar registro</button>
                        <button type="button" class="btn" id="btnCancelar">Cancelar</button>
                        <button type="button" class="btn" id="btnLimpar">Limpar</button>
                    </div>

                    <div class="msg" id="msg"></div>
                </form>

                <hr class="divider" />

                <!-- FILTROS -->
                <div class="filtros-wrap">
                    <div class="filtros-grid">
                        <div class="filtro-field">
                            <label for="filtroNome">Nome</label>
                            <input id="filtroNome" type="text" placeholder="Buscar por nome…" autocomplete="off" />
                        </div>
                        <div class="filtro-field">
                            <label for="filtroTema">Tema</label>
                            <select id="filtroTema">
                                <option value="">Todos os temas</option>
                                <option value="EVOLUCAO_FUNCIONAL">Evolução funcional</option>
                                <option value="APOSENTADORIA">Aposentadoria</option>
                                <option value="FAI_PUCT">FAI &amp; PUCT</option>
                            </select>
                        </div>
                        <div class="filtro-field">
                            <label for="filtroStatus">Status</label>
                            <select id="filtroStatus">
                                <option value="">Todos os status</option>
                                <option value="em andamento">Em andamento</option>
                                <option value="atendendo exigencias">Atendendo exigências</option>
                                <option value="concluido">Concluído</option>
                                <option value="não concluido">Não concluído</option>
                            </select>
                        </div>
                        <div class="filtro-field">
                            <label for="filtroEscola">Escola</label>
                            <input id="filtroEscola" type="text" placeholder="Buscar por escola…" autocomplete="off" />
                        </div>
                        <div class="filtro-field">
                            <label for="filtroProtocolo">Protocolo / Processo</label>
                            <input id="filtroProtocolo" type="text" placeholder="Número do protocolo…"
                                autocomplete="off" />
                        </div>
                        <div class="filtro-field filtro-actions">
                            <button type="button" class="btn ghost btn-sm" id="btnLimparFiltros">✕ Limpar
                                filtros</button>
                        </div>
                    </div>
                    <div class="filtros-info">
                        <span id="filtrosInfo" class="muted"></span>
                    </div>
                </div>

                <div class="table-head">
                    <h3>Registros</h3>
                    <div class="table-actions">
                        <button class="btn ghost btn-sm" id="btnExportar">Exportar JSON</button>
                        <button class="btn danger btn-sm" id="btnApagarTudo">Apagar tudo</button>
                    </div>
                </div>

                <div class="table-wrap">
                    <table class="table" id="tblRegistros">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Tema</th>
                                <th>Nome</th>
                                <th>Escola</th>
                                <th>Status</th>
                                <th>Protocolo/Processo</th>
                                <th>Entrada</th>
                                <th>Saída</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="tbodyRegistros"></tbody>
                    </table>
                </div>
            </section>
        </main>

        <footer class="footer">
            <span>SEAPE • Cadastro</span>
        </footer>
    </div>
</body>

</html>
