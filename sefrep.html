<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro – SEFREP</title>
    <link rel="stylesheet" href="sefrep.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="sefrep.js" defer></script>
</head>

<body>
    <div class="page">
        <header class="topbar">
            <div class="topbar-left">
                <h1>Cadastro – SEFREP</h1>
                <p class="subtitle">Registro por tema (VTC, CTC, Licença Premio, Contagem de Tempo).</p>
            </div>

            <div class="topbar-right">
                <span class="pill" id="pillTema">Tema: <strong>VTC</strong></span>
                <button class="btn ghost" id="btnIrIndex" type="button">Menu</button>
                <button class="btn ghost" id="btnIrSeape" type="button">SEAPE</button>
            </div>
        </header>

        <main class="content">
            <aside class="sidebar">
                <div class="sidebar-title">Temas</div>

                <button class="nav-item active" data-tema="VTC" type="button">
                    <span class="dot"></span> VTC
                </button>
                <button class="nav-item" data-tema="CTC" type="button">
                    <span class="dot"></span> CTC
                </button>
                <button class="nav-item" data-tema="LICENCA_PREMIUM" type="button">
                    <span class="dot"></span> Licença Premio
                </button>
                <button class="nav-item" data-tema="CONTAGEM_TEMPO" type="button">
                    <span class="dot"></span> Contagem de Tempo
                </button>
            </aside>

            <section class="panel">
                <div class="panel-head">
                    <h2 id="tituloForm">VTC</h2>
                    <p id="descForm" class="panel-subtitle">Preencha os campos e clique em "Salvar registro".</p>
                </div>

                <form id="formSefrep" class="form">
                    <div id="formArea"></div>

                    <div class="form-actions">
                        <button type="submit" class="btn primary">Salvar registro</button>
                        <button type="button" class="btn" id="btnCancelar">Cancelar</button>
                        <button type="button" class="btn" id="btnLimpar">Limpar</button>
                    </div>

                    <div class="msg" id="msg"></div>
                </form>

                <hr class="divider" />

                <!-- FILTROS -->
                <div class="filtros-wrap">
                    <div class="filtros-grid">
                        <div class="filtro-field">
                            <label for="filtroNome">Nome</label>
                            <input id="filtroNome" type="text" placeholder="Buscar por nome…" autocomplete="off" />
                        </div>
                        <div class="filtro-field">
                            <label for="filtroTema">Tema</label>
                            <select id="filtroTema">
                                <option value="">Todos os temas</option>
                                <option value="VTC">VTC</option>
                                <option value="CTC">CTC</option>
                                <option value="LICENCA_PREMIUM">Licença Premio</option>
                                <option value="CONTAGEM_TEMPO">Contagem de Tempo</option>
                            </select>
                        </div>
                        <div class="filtro-field">
                            <label for="filtroStatus">Status / Situação</label>
                            <select id="filtroStatus">
                                <option value="">Todos os status</option>
                                <option value="em andamento">Em andamento</option>
                                <option value="concluido">Concluído</option>
                                <option value="não concluido">Não concluído</option>
                                <option value="finalizado">Finalizado</option>
                                <option value="em analise">Em análise</option>
                                <option value="devolvido">Devolvido para correção</option>
                                <option value="publicado">Publicado</option>
                            </select>
                        </div>
                        <div class="filtro-field">
                            <label for="filtroEscola">Escola</label>
                            <input id="filtroEscola" type="text" placeholder="Buscar por escola…" autocomplete="off" />
                        </div>
                        <div class="filtro-field">
                            <label for="filtroProtocolo">Protocolo / Processo</label>
                            <input id="filtroProtocolo" type="text" placeholder="Número do protocolo…"
                                autocomplete="off" />
                        </div>
                        <div class="filtro-field filtro-actions">
                            <button type="button" class="btn ghost btn-sm" id="btnLimparFiltros">✕ Limpar
                                filtros</button>
                        </div>
                    </div>
                    <div class="filtros-info">
                        <span id="filtrosInfo" class="muted"></span>
                    </div>
                </div>

                <div class="table-head" id="lista">
                    <h3>Registros</h3>
                    <div class="table-actions">
                        <button class="btn ghost btn-sm" id="btnExportar" type="button">Exportar JSON</button>
                        <button class="btn danger btn-sm" id="btnApagarTudo" type="button">Apagar tudo</button>
                    </div>
                </div>

                <div class="table-wrap">
                    <table class="table" id="tblRegistros">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Tema</th>
                                <th>Nome</th>
                                <th>Escola</th>
                                <th>Status</th>
                                <th>Protocolo/Processo</th>
                                <th>Entrada</th>
                                <th>Saída</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="tbodyRegistros"></tbody>
                    </table>
                </div>
            </section>
        </main>

        <footer class="footer">
            <span>SEFREP • Cadastro</span>
        </footer>
    </div>
</body>

</html>
